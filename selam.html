<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- WhatsApp önizlemesi için Open Graph etiketleri -->
  <meta property="og:title" content="Selam Dostlarım 👋" />
  <meta property="og:description" content="Sana özel bir mesaj var!" />
  <meta property="og:type" content="website" />
  <title>Selam Dostlarım</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* Arka plan parıltıları */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .blob-1 { width: 400px; height: 400px; background: #7f5af0; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 350px; height: 350px; background: #2cb67d; bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob-3 { width: 250px; height: 250px; background: #ff6b6b; bottom: 30%; left: 10%; animation-delay: 4s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      animation: popIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7) translateY(40px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .emoji {
      font-size: 72px;
      display: block;
      margin-bottom: 20px;
      animation: wave 1.8s ease-in-out infinite;
      transform-origin: 70% 70%;
    }

    @keyframes wave {
      0%,100% { transform: rotate(0deg); }
      20%      { transform: rotate(-15deg); }
      40%      { transform: rotate(15deg); }
      60%      { transform: rotate(-10deg); }
      80%      { transform: rotate(8deg); }
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, #ffffff, #c4b5fd, #7f5af0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    p {
      margin-top: 18px;
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px;
    }

    .glow-line {
      margin: 28px auto 0;
      width: 80px;
      height: 4px;
      border-radius: 99px;
      background: linear-gradient(90deg, #7f5af0, #2cb67d);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 6px #7f5af0; }
      to   { box-shadow: 0 0 20px #2cb67d; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <span class="emoji">👋</span>
    <h1>Selam Dostlarım</h1>
    <p>Bu sayfaya hoş geldin ✨</p>
    <div class="glow-line"></div>
  </div>
</body>
</html>
